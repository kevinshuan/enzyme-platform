services:
  app:
    build:
      context: .
    container_name: fastapi_app
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      ENV_FILE: /app/.env
      GLOBAL_DATABASE_URL: ${GLOBAL_DATABASE_URL:-postgresql://postgres:postgres@db:5432/app_db}
    volumes:
      - .:/app
      - app_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
    command:
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  app_venv:
